name: release

# Publish to PyPI on a version tag. Cut a release with:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Requires a PyPI token in the repo secrets as PYPI_API_TOKEN
# (Settings → Secrets and variables → Actions → New repository secret).
# A more secure alternative is PyPI Trusted Publishing (OIDC): drop the
# `password:` line, add `permissions: id-token: write` to this job, and
# register this workflow as a trusted publisher on the PyPI project.
#
# The dashboard ships as a vendored single-file build
# (src/agentdiff/dashboard_assets/index.html), produced by the CLI-only
# `npm run build:cli` (report dashboard only — no router/Clerk/marketing).
# This workflow builds and re-vendors it automatically before packaging — no
# manual pre-step required.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Fail fast before the build if the tag doesn't match the packaged
      # version — otherwise we'd publish a wheel whose version disagrees with
      # its tag, or hit PyPI's "file already exists" on a forgotten bump.
      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os, pathlib, sys, tomllib
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          if tag != f"v{version}":
              sys.exit(f"Tag {tag} != package version v{version} (pyproject.toml). Bump the version or fix the tag.")
          print(f"OK: tag {tag} matches package version {version}")
          PY

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy

      - name: Test
        run: pytest -q

      - name: Build CLI dashboard and vendor into the package
        # build:cli emits a single self-contained HTML (report dashboard only,
        # no router/Clerk/marketing) via vite-plugin-singlefile. The default
        # `npm run build` is the hosted SPA and is NOT vendored.
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build:cli
          cp frontend/dist-cli/cli.html src/agentdiff/dashboard_assets/index.html

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify the dashboard asset is in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          wheel = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(wheel).namelist()
          asset = "agentdiff/dashboard_assets/index.html"
          if asset not in names:
              sys.exit(f"MISSING {asset} in {wheel}")
          print(f"OK: {asset} present in {wheel}")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
