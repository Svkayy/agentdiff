# Deploy the unified AgentDiff frontend (marketing, docs, and dashboard shell)
# to GitHub Pages. Vercel is the recommended one-link production host for the
# UI; this workflow keeps the previous Pages path working without the retired
# landing/ app.
name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "docs/**"
      - "SECURITY.md"
      - ".github/workflows/deploy-landing.yml"
  # Allow manual redeploys from the Actions tab.
  workflow_dispatch:

# Least-privilege token for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: Build unified frontend (tsc + vite)
        run: npm --prefix frontend run build
        env:
          # Required for authenticated dashboard routes in hosted production.
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          # API origin for the hosted dashboard. Public marketing/docs render
          # without this, but dashboard API calls need it.
          VITE_AGENTDIFF_API_URL: ${{ vars.VITE_AGENTDIFF_API_URL }}
          AGENTDIFF_GITHUB_PAGES: "true"

      - name: Add Pages SPA fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
