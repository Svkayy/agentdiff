services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agentdiff
      POSTGRES_PASSWORD: agentdiff
      POSTGRES_DB: agentdiff
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentdiff"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
