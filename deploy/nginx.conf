# AgentDiff production reverse proxy: TLS termination, http→https redirect,
# HSTS, and routing to the api + dashboard containers.
#
# Replace `agentdiff.example.com` with your domain and mount real certs at
# ./deploy/certs/fullchain.pem + privkey.pem (see docs/deploy-production.md).

# ── http → https redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name agentdiff.example.com;

    # Allow ACME http-01 challenges (certbot) to pass through un-redirected.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── https ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name agentdiff.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — force HTTPS for one year, including subdomains. Only enable once
    # you are certain every host under this domain serves HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Reasonable upload ceiling for run/traffic ingest (matches the API's
    # 50 MB body cap; raise both together if you lift the app-level limit).
    client_max_body_size 50m;

    # API — everything under /v1 and the ops endpoints.
    location ~ ^/(v1|health|metrics) {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Dashboard SPA (served by the dashboard container's nginx on :80).
    location / {
        proxy_pass       http://dashboard:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
